<!DOCTYPE html>
<html lang="es">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Asistencia QR</title>

<script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

<style>
body{
font-family: Arial;
text-align:center;
background:#f2f2f2;
margin:0;
padding:20px;
}

h2{
color:#1565c0;
}

#reader{
width:100%;
max-width:400px;
margin:auto;
background:white;
padding:10px;
border-radius:10px;
}

#resultado{
margin-top:20px;
padding:15px;
background:white;
border-radius:10px;
font-size:20px;
font-weight:bold;
box-shadow:0 2px 5px rgba(0,0,0,0.2);
}
</style>

</head>

<body>

<h2>CONTROL DE ASISTENCIA QR</h2>

<div id="reader"></div>

<div id="resultado">Esperando QR...</div>

<script>

const WEBAPP = "https://script.google.com/macros/s/AKfycbwjvq5ojBFJvbtuBHW6Ru2Nl1xEqPbHWXFL0b72zGMmOJWC7DNfoRMeRag_yKjXpgq16w/exec";

let ultimoCodigo = "";
let bloqueado = false;

// 🔊 sonido
function beep(){
const audio = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
audio.play();
}

// 📤 registrar asistencia
function registrar(id){

id = id.trim();

// mostramos estado
document.getElementById("resultado").innerHTML =
"Registrando: " + id;

// 🔥 redirección directa (NO falla nunca)
window.location.href =
WEBAPP + "?id=" + encodeURIComponent(id);

}

// 📷 QR detectado
function onScanSuccess(decodedText){

decodedText = decodedText
.replace(/\s+/g, "")  // elimina espacios y saltos
.trim();

if(bloqueado) return;
if(decodedText === ultimoCodigo) return;

ultimoCodigo = decodedText;
bloqueado = true;

registrar(decodedText);

setTimeout(()=>{
bloqueado = false;
ultimoCodigo = "";
},3000);

}

// 🚀 iniciar cámara
document.addEventListener("DOMContentLoaded", function () {

const scanner = new Html5QrcodeScanner(
"reader",
{
fps: 10,
qrbox: 250
},
false
);

scanner.render(onScanSuccess);

});

</script>

</body>
</html>
