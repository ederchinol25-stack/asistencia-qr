<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Asistencia QR</title>
  <script src="https://cdn.jsdelivr.net/npm/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: Arial, sans-serif;
      text-align: center;
      background: #e3f2fd;
      padding: 20px;
      min-height: 100vh;
    }
    h2 { color: #1565c0; margin-bottom: 16px; font-size: 20px; }
    #reader {
      width: 100%;
      max-width: 400px;
      margin: 0 auto 20px auto;
      background: white;
      padding: 10px;
      border-radius: 12px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }
    #resultado {
      max-width: 400px;
      margin: 0 auto;
      padding: 18px;
      background: white;
      border-radius: 12px;
      font-size: 18px;
      font-weight: bold;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
      transition: background 0.3s;
      min-height: 70px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }
    #resultado .nombre { font-size: 18px; }
    #resultado .detalle { font-size: 14px; font-weight: normal; color: #555; }
    #hora {
      max-width: 400px;
      margin: 10px auto 0 auto;
      font-size: 13px;
      color: #666;
    }
  </style>
</head>
<body>

  <h2>📋 CONTROL DE ASISTENCIA QR</h2>
  <div id="reader"></div>
  <div id="resultado">📷 Esperando QR...</div>
  <div id="hora"></div>

  <script>
    const WEBAPP = "https://script.google.com/macros/s/AKfycbwjvq5ojBFJvbtuBHW6Ru2Nl1xEqPbHWXFL0b72zGMmOJWC7DNfoRMeRag_yKjXpgq16w/exec";

    // ✅ Bloqueo inmediato con Set de IDs en proceso
    const enProceso = new Set();

    function beep() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value = 880; o.type = "sine";
        g.gain.setValueAtTime(3, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.4);
        o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.4);
      } catch(e) {}
    }

    function beepError() {
      try {
        const ctx = new (window.AudioContext || window.webkitAudioContext)();
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.connect(g); g.connect(ctx.destination);
        o.frequency.value = 300; o.type = "sine";
        g.gain.setValueAtTime(3, ctx.currentTime);
        g.gain.exponentialRampToValueAtTime(0.01, ctx.currentTime + 0.5);
        o.start(ctx.currentTime); o.stop(ctx.currentTime + 0.5);
      } catch(e) {}
    }

    function mostrar(icono, nombre, detalle, color) {
      const r = document.getElementById("resultado");
      r.innerHTML = `<div class="nombre">${icono} ${nombre}</div><div class="detalle">${detalle}</div>`;
      r.style.background = color;
      const ahora = new Date();
      document.getElementById("hora").innerText =
        ahora.toLocaleDateString("es-PE") + " " + ahora.toLocaleTimeString("es-PE");
    }

    function registrar(id) {
      id = id.toString().trim().replace(/\s+/g, "");

      // ✅ Bloqueo inmediato antes de hacer fetch
      if (enProceso.has(id)) return;
      enProceso.add(id);

      mostrar("⏳", "Registrando...", id, "#fff9c4");

      fetch(WEBAPP + "?id=" + encodeURIComponent(id))
        .then(r => r.text())
        .then(resp => {
          resp = resp.trim();
          const partes = resp.split(":");
          const estado = partes[0];
          const nombre = partes[1] || id;
          const grado = partes[2] || "";
          const seccion = partes[3] || "";
          const detalle = grado ? `${grado} — Sección ${seccion}` : "";

          if (estado === "REGISTRADO") {
            mostrar("✅", nombre, detalle, "#c8e6c9");
            beep();
          } else if (estado === "YA_REGISTRADO") {
            mostrar("⚠️", nombre, "Ya registrado hoy — " + detalle, "#fff3e0");
            beepError();
          } else if (estado === "NO_ENCONTRADO") {
            mostrar("❌", "No encontrado", id, "#ffcdd2");
            beepError();
          } else {
            mostrar("❌", "Error", resp, "#ffcdd2");
            beepError();
          }
        })
        .catch(() => {
          mostrar("❌", "Error de conexión", "", "#ffcdd2");
          beepError();
        })
        .finally(() => {
          // ✅ Liberar después de 5 segundos
          setTimeout(() => enProceso.delete(id), 5000);
        });
    }

    function onScanSuccess(decodedText) {
      decodedText = decodedText.toString().trim().replace(/\s+/g, "");
      registrar(decodedText);
    }

    document.addEventListener("DOMContentLoaded", function () {
      const scanner = new Html5QrcodeScanner(
        "reader",
        { fps: 5, qrbox: 250 },
        false
      );
      scanner.render(onScanSuccess);
    });
  </script>

</body>
</html>
