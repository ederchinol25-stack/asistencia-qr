<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Control de Asistencia QR</title>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>

body{
font-family:Arial,sans-serif;
text-align:center;
background:#f5f5f5;
margin:0;
padding:20px;
}

h2{
color:#1565c0;
}

#reader{
width:100%;
max-width:500px;
margin:auto;
background:white;
padding:10px;
border-radius:10px;
}

#resultado{
margin-top:20px;
padding:15px;
background:white;
border-radius:10px;
font-size:22px;
font-weight:bold;
box-shadow:0 2px 5px rgba(0,0,0,.2);
}

</style>

</head>

<body>

<h2>CONTROL DE ASISTENCIA QR</h2>

<div id="reader"></div>

<div id="resultado">
Esperando QR...
</div>

<script>

const WEBAPP =
"https://script.google.com/macros/s/AKfycbwjvq5ojBFJvbtuBHW6Ru2Nl1xEqPbHWXFL0b72zGMmOJWC7DNfoRMeRag_yKjXpgq16w/exec";

let ultimoCodigo = "";
let bloqueado = false;

function beep(){

const audio = new Audio(
"https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg"
);

audio.play();

}

function registrar(id){

document.getElementById("resultado").innerHTML =
"Registrando: " + id;

const iframe =
document.createElement("iframe");

iframe.style.display = "none";

iframe.src =
WEBAPP +
"?id=" +
encodeURIComponent(id) +
"&t=" +
Date.now();

document.body.appendChild(iframe);

document.getElementById("resultado").innerHTML =
"✅ Registrado: " + id;

beep();

}

function onScanSuccess(decodedText){

if(bloqueado) return;

if(decodedText === ultimoCodigo) return;

ultimoCodigo = decodedText;
bloqueado = true;

registrar(decodedText);

setTimeout(()=>{

bloqueado = false;
ultimoCodigo = "";

},3000);

}

const scanner =
new Html5QrcodeScanner(
"reader",
{
fps:10,
qrbox:250
},
false
);

scanner.render(
onScanSuccess,
(error)=>{}
);

</script>

</body>

</html>
